<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBA AI - Course Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .semester-header { border-left: 5px solid #2c3e50; padding-left: 15px; margin: 30px 0; color: #2c3e50; }
        .course-card { border: none; border-radius: 12px; height: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .prof-label { font-weight: 600; color: #6c757d; font-size: 0.85rem; margin-top: 10px; display: block; }
        .btn-class { border-radius: 6px; margin-top: 5px; font-weight: 500; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container"><span class="navbar-brand mb-0 h1">MBA in AI for Business</span></div>
</nav>

<div class="container mb-5">
    <h2 class="semester-header">Semester 1</h2>
    <div class="row g-4">
        
        <!-- Business Statistics -->
        <div class="col-md-3">
            <div class="card course-card p-3">
                <div class="card-body">
                    <h5 class="card-title text-primary">Business Statistics</h5>
                    <span class="prof-label">Prof. Sandeep Kayastha</span>
                    <a href="stats-c1.html" class="btn btn-outline-dark btn-sm btn-class w-100">Class - 1</a>
                </div>
            </div>
        </div>

        <!-- Managerial Accounting -->
        <div class="col-md-3">
            <div class="card course-card p-3">
                <div class="card-body">
                    <h5 class="card-title text-success">Managerial Accounting</h5>
                    <span class="prof-label">Prof. Ankita Nagpal</span>
                    <a href="acc-nagpal-c1.html" class="btn btn-outline-success btn-sm btn-class w-100">Class - 1</a>
                    
                    <span class="prof-label">Prof. Abhishek Sinha</span>
                    <a href="acc-sinha-c1.html" class="btn btn-outline-success btn-sm btn-class w-100">Class - 1</a>
                </div>
            </div>
        </div>

        <!-- Marketing Management -->
        <div class="col-md-3">
            <div class="card course-card p-3">
                <div class="card-body">
                    <h5 class="card-title text-info">Marketing Management</h5>
                    <span class="prof-label">Prof. Atul Kumar</span>
                    <a href="mkt-kumar-c1.html" class="btn btn-outline-info btn-sm btn-class w-100">Class - 1</a>
                    
                    <span class="prof-label">Prof. Sagar Venkateshwar</span>
                    <a href="mkt-sagar-c1.html" class="btn btn-outline-info btn-sm btn-class w-100">Class - 1</a>
                </div>
            </div>
        </div>

        <!-- Managing People -->
        <div class="col-md-3">
            <div class="card course-card p-3 bg-light">
                <div class="card-body text-center">
                    <h5 class="card-title text-muted">Managing People & Org</h5>
                    <p class="small text-muted mt-4">Recordings Pending</p>
                </div>
            </div>
        </div>
    </div>
</div>

</html>
